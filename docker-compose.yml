services:

  # ─────────────────────────────────────────
  # PostgreSQL + pgvector
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: careeriq-postgres
    environment:
      POSTGRES_DB: careeriq
      POSTGRES_USER: careeriq
      POSTGRES_PASSWORD: careeriq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careeriq -d careeriq"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # LocalStack (SQS + S3)
  # ─────────────────────────────────────────
  localstack:
    image: localstack/localstack:3
    container_name: careeriq-localstack
    environment:
      SERVICES: sqs,s3
      DEFAULT_REGION: us-east-1
      LOCALSTACK_VOLUME_DIR: /var/lib/localstack
    ports:
      - "4566:4566"
    volumes:
      - ./localstack/init:/etc/localstack/init/ready.d
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health | grep -q '\"sqs\": \"running\"'"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  localstack_data:
