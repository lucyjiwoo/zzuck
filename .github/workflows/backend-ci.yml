name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
    backend-ci:
        runs-on: ubuntu-latest

        defaults:
             run:
                working-directory: backend


        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run tests
              run:  pytest