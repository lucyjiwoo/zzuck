name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'worker/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'worker/**'

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt
